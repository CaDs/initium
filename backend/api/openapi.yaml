components:
  schemas:
    APIError:
      additionalProperties: false
      properties:
        code:
          description: Machine-readable error code in SNAKE_UPPER format
          type: string
        message:
          description: Human-readable error message
          type: string
        request_id:
          description: Correlates client error to server log entry
          type: string
      required:
        - code
        - message
      type: object
    AdminPingResponse:
      additionalProperties: false
      properties:
        role:
          enum:
            - admin
          type: string
      required:
        - role
      type: object
    LandingInfo:
      additionalProperties: false
      properties:
        description:
          description: Tagline shown on the landing page
          type: string
        name:
          description: Product name
          type: string
        version:
          description: API version
          type: string
      required:
        - name
        - description
        - version
      type: object
    UpdateProfileInputBody:
      additionalProperties: false
      properties:
        name:
          description: New display name (1-100 characters)
          maxLength: 100
          minLength: 1
          type: string
      required:
        - name
      type: object
    User:
      additionalProperties: false
      properties:
        avatar_url:
          description: URL to avatar image (empty when not set)
          type: string
        created_at:
          description: Account creation timestamp
          format: date-time
          type: string
        email:
          description: Email address
          format: email
          type: string
        id:
          description: User UUID
          format: uuid
          type: string
        name:
          description: Display name
          type: string
        role:
          description: Authorization role
          enum:
            - user
            - admin
          type: string
      required:
        - id
        - email
        - name
        - avatar_url
        - role
        - created_at
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  description: POC starter template API. Generated from Go code by Huma — never hand-edit.
  title: Initium API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/admin/ping:
    get:
      operationId: admin-ping
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPingResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security:
        - bearerAuth: []
      summary: Verify admin role enforcement
      tags:
        - admin
  /api/landing:
    get:
      operationId: get-landing
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingInfo"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      summary: Public landing page data
      tags:
        - public
  /api/me:
    get:
      operationId: get-me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security:
        - bearerAuth: []
      summary: Get current user profile
      tags:
        - user
    patch:
      operationId: update-me
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security:
        - bearerAuth: []
      summary: Update current user's display name
      tags:
        - user
servers:
  - description: Local development
    url: http://localhost:8000
