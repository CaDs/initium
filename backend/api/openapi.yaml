components:
  schemas:
    APIError:
      additionalProperties: false
      properties:
        code:
          description: Machine-readable error code in SNAKE_UPPER format
          type: string
        message:
          description: Human-readable error message
          type: string
        request_id:
          description: Correlates client error to server log entry
          type: string
      required:
        - code
        - message
      type: object
    AdminPingResponse:
      additionalProperties: false
      properties:
        role:
          enum:
            - admin
          type: string
      required:
        - role
      type: object
    LandingInfo:
      additionalProperties: false
      properties:
        description:
          description: Tagline shown on the landing page
          type: string
        name:
          description: Product name
          type: string
        version:
          description: API version
          type: string
      required:
        - name
        - description
        - version
      type: object
    MagicLinkInputBody:
      additionalProperties: false
      properties:
        email:
          description: User email
          format: email
          type: string
      required:
        - email
      type: object
    MessageResponse:
      additionalProperties: false
      properties:
        message:
          type: string
      required:
        - message
      type: object
    MobileGoogleInputBody:
      additionalProperties: false
      properties:
        id_token:
          description: Google ID token from the mobile SDK
          minLength: 1
          type: string
      required:
        - id_token
      type: object
    MobileVerifyInputBody:
      additionalProperties: false
      properties:
        token:
          description: Magic-link token from the deep link
          minLength: 1
          type: string
      required:
        - token
      type: object
    RefreshInputBody:
      additionalProperties: false
      properties:
        refresh_token:
          description: Refresh token (mobile JSON body)
          type: string
      type: object
    TokenPair:
      additionalProperties: false
      properties:
        access_token:
          description: "Short-lived JWT (~15 min) for the Authorization: Bearer header"
          type: string
        refresh_token:
          description: Long-lived token (~7 days) for renewing the access token
          type: string
      required:
        - access_token
        - refresh_token
      type: object
    UpdateProfileInputBody:
      additionalProperties: false
      properties:
        name:
          description: New display name (1-100 characters)
          maxLength: 100
          minLength: 1
          type: string
      required:
        - name
      type: object
    User:
      additionalProperties: false
      properties:
        avatar_url:
          description: URL to avatar image (empty when not set)
          type: string
        created_at:
          description: Account creation timestamp
          format: date-time
          type: string
        email:
          description: Email address
          format: email
          type: string
        id:
          description: User UUID
          format: uuid
          type: string
        name:
          description: Display name
          type: string
        role:
          description: Authorization role
          enum:
            - user
            - admin
          type: string
      required:
        - id
        - email
        - name
        - avatar_url
        - role
        - created_at
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  description: POC starter template API. Generated from Go code by Huma — never hand-edit.
  title: Initium API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/admin/ping:
    get:
      operationId: admin-ping
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPingResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security:
        - bearerAuth: []
      summary: Verify admin role enforcement
      tags:
        - admin
  /api/auth/logout:
    post:
      operationId: logout
      parameters:
        - description: Refresh token to revoke (web cookie)
          in: cookie
          name: refresh_token
          schema:
            description: Refresh token to revoke (web cookie)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security:
        - bearerAuth: []
      summary: Revoke the current session
      tags:
        - auth
  /api/auth/logout-all:
    post:
      operationId: logout-all
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security:
        - bearerAuth: []
      summary: Revoke every session for the current user
      tags:
        - auth
  /api/auth/magic-link:
    post:
      operationId: request-magic-link
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      summary: Email a one-use magic link
      tags:
        - auth
  /api/auth/mobile/google:
    post:
      operationId: mobile-google-id-token
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileGoogleInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      summary: Exchange a Google ID token for a session (mobile flow)
      tags:
        - auth
        - mobile
  /api/auth/mobile/verify:
    post:
      operationId: mobile-verify-magic-link
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileVerifyInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      summary: Exchange a magic-link token for a session (mobile flow)
      tags:
        - auth
        - mobile
  /api/auth/refresh:
    post:
      operationId: refresh-tokens
      parameters:
        - description: Refresh token (web cookie path /api/auth)
          in: cookie
          name: refresh_token
          schema:
            description: Refresh token (web cookie path /api/auth)
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      summary: Exchange a refresh token for a new access + refresh pair
      tags:
        - auth
  /api/landing:
    get:
      operationId: get-landing
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingInfo"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      summary: Public landing page data
      tags:
        - public
  /api/me:
    get:
      operationId: get-me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security:
        - bearerAuth: []
      summary: Get current user profile
      tags:
        - user
    patch:
      operationId: update-me
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
          description: Error
      security:
        - bearerAuth: []
      summary: Update current user's display name
      tags:
        - user
servers:
  - description: Local development
    url: http://localhost:8000
