run:
  timeout: 3m
  skip-dirs:
    - vendor
    - tmp

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - staticcheck
    - gofmt
    - goimports
    - ineffassign
    - unused
    - misspell
    - gosec

linters-settings:
  goimports:
    local-prefixes: github.com/eridia/initium
