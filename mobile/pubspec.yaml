name: mobile
description: "Initium — POC starter mobile app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4
  google_sign_in: ^6.2.2
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.1
  particle_field: ^1.0.0
  gap: ^3.0.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/illustrations/landing/
    - assets/illustrations/login/
    - assets/illustrations/home/
    - assets/icons/
    - assets/particles/
