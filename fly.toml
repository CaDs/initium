# fly.toml — Fly.io deploy config for the Initium backend.
# Fork users: rename the app and primary_region to match your Fly account.
# Run: fly launch --no-deploy  (reads this file; do NOT fly deploy until secrets are set)

app            = "initium"
primary_region = "iad"

[build]
  # backend/Dockerfile uses `COPY go.mod go.sum ./` and `COPY . .` which expect
  # the build context to be the `backend/` directory (where go.mod lives).
  dockerfile = "Dockerfile"
  context    = "backend"

[env]
  APP_ENV = "production"
  # All other secrets must be set via:
  #   fly secrets set KEY=value
  # Never hard-code secrets here. See README.md § Deployment.

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 500
    soft_limit = 200

[[http_service.checks]]
  grace_period  = "5s"
  interval      = "15s"
  method        = "GET"
  path          = "/readyz"
  protocol      = "http"
  timeout       = "5s"
